<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#07111f"/>

  <!-- Glow layer -->
  <rect width="32" height="32" rx="7" fill="url(#bg-glow)" opacity="0.6"/>

  <!-- N letterform -->
  <path d="M6 8 L6 24 L10 24 L10 15.5 L19.5 24 L26 24 L26 8 L22 8 L22 16.5 L12.5 8 Z" fill="url(#n-grad)"/>

  <!-- Node dots at corners of the N -->
  <circle cx="6"  cy="8"  r="2.2" fill="#c4b5fd" opacity="0.9"/>
  <circle cx="26" cy="8"  r="2.2" fill="#c4b5fd" opacity="0.9"/>
  <circle cx="6"  cy="24" r="2.2" fill="#67d6ff" opacity="0.9"/>
  <circle cx="26" cy="24" r="2.2" fill="#67d6ff" opacity="0.9"/>
  <!-- Center connection dot -->
  <circle cx="16" cy="16" r="1.6" fill="#ffffff" opacity="0.5"/>

  <defs>
    <linearGradient id="n-grad" x1="6" y1="8" x2="26" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="50%"  stop-color="#67d6ff"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#0c2540"/>
      <stop offset="100%" stop-color="#07111f"/>
    </radialGradient>
  </defs>
</svg>
