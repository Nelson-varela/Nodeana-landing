<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#030b14"/>
  <rect width="32" height="32" rx="7" fill="url(#bg-glow)" opacity="0.7"/>

  <!-- "Nd" bold text -->
  <text
    x="3"
    y="23"
    font-family="ui-sans-serif, system-ui, -apple-system, Arial, sans-serif"
    font-weight="900"
    font-size="19"
    letter-spacing="-1"
    fill="#f0f6ff"
  >Nd</text>

  <!-- Oversized teal node-dot (the ".") -->
  <circle cx="27" cy="23" r="3.8" fill="#22d3ee"/>
  <!-- Glow ring -->
  <circle cx="27" cy="23" r="5.5" fill="#22d3ee" opacity="0.18"/>

  <defs>
    <radialGradient id="bg-glow" cx="75%" cy="25%" r="65%">
      <stop offset="0%"   stop-color="#083656"/>
      <stop offset="100%" stop-color="#030b14"/>
    </radialGradient>
  </defs>
</svg>
